openapi: 3.1.1
info:
  title: Minha API
  description: Projeto de uma API REST usando ExpressJs e Mongoose.
  version: 0.1.0
servers:
  - url: http://localhost:3000/
    description: Ambiente de Desenvolvimento
tags:
  - tarefas
paths:
  /tarefas:
    get:
      summary: Lista as tarefas
      tags:
        - tarefas
      responses:
        200:
          description: Operação com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tarefa'
        500:
          description: Erro inesperado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
    post:
      summary: Cria uma tarefa
      tags:
        - tarefas    
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                  example: Estudar Swagger
      responses:
        201:
          description: Tarefa criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tarefa'
        422:
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        500:
          description: Erro inesperado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
  /tarefas/id:
    get:
      summary: Obter uma tarefa pelo ID
      tags:
        - tarefas    
      parameters:
        - in: path
          name: tarefaId
          schema:
            type: string
          required: true
      responses:
        200:
          description: Tarefa encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tarefa'
        400:
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        404:
          description: Tarefa não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        500:
          description: Erro inesperado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
    put:
      security:
        - token_jwt: []
      summary: Atualizar uma tarefa existente
      tags:
        - tarefas    
      parameters:
        - in: path
          name: tarefaId
          schema:
            type: string
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                concluida:
                  type: boolean
      responses:
        200:
          description: Tarefa atualizada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tarefa'
        400:
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        404:
          description: Tarefa não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        422:
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        500:
          description: Erro inesperado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
    delete:
      summary: Apagar uma tarefa existente
      tags:
        - tarefas    
      parameters:
        - in: path
          name: tarefaId
          schema:
            type: string
          required: true
      responses:
        204:
          description: Tarefa apagada com sucesso
          content:
        400:
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        404:
          description: Tarefa não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        500:
          description: Erro inesperado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
components:
  schemas:  
    Tarefa:
      type: object
      properties:
        id:
          type: string
        nome:
          type: string
        concluida:
          type: boolean
    Erro:
      type: object
      properties:
        msg:
          type: string
  securitySchemes:
    token_jwt:
      type: http
      scheme: bearer
      in: header
      name: Authorization